<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mi App Fullstack</title>
</head>
<body>
    <h1>Conexión HTML -> Node -> MongoDB</h1>
    <button id="btn">Saludar al Backend</button>
    <p id="respuesta"></p>

    <script>
        document.getElementById('btn').addEventListener('click', async () => {
            const res = await fetch('/api/saludo');
            const data = await res.json();
            document.getElementById('respuesta').innerText = data.mensaje;
        });
    </script>
</body>
</html>
